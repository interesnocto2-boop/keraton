<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="gold" x1="30%" y1="10%" x2="70%" y2="90%">
      <stop offset="0%"   stop-color="#f8e898"/>
      <stop offset="30%"  stop-color="#d4a840"/>
      <stop offset="60%"  stop-color="#c9a97a"/>
      <stop offset="80%"  stop-color="#7a5818"/>
      <stop offset="100%" stop-color="#e8c858"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f8e898"/>
      <stop offset="35%"  stop-color="#c9a97a"/>
      <stop offset="70%"  stop-color="#8a6040"/>
      <stop offset="100%" stop-color="#d4b060"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#2a1e10"/>
      <stop offset="100%" stop-color="#0f0a06"/>
    </radialGradient>
  </defs>

  <!-- Фон -->
  <rect width="500" height="500" fill="#0f0a06"/>

  <!-- Круг-медальон -->
  <circle cx="250" cy="250" r="220" fill="url(#bg)"/>
  <circle cx="250" cy="250" r="220" fill="none" stroke="url(#ring)" stroke-width="5"/>
  <circle cx="250" cy="250" r="188" fill="none" stroke="rgba(201,169,122,0.22)" stroke-width="1.5" stroke-dasharray="8 10"/>

  <!-- Буква К -->
  <text x="250" y="330"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="240"
    font-weight="900"
    fill="url(#gold)">К</text>
</svg>
